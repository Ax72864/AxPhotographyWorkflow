# Multi-Source Rated Images Downloader Configuration

[flickr]
# Get your Flickr API credentials at: https://www.flickr.com/services/apps/create/
# Free tier: 3600 requests/hour
api_key = YOUR_FLICKR_API_KEY
api_secret = YOUR_FLICKR_SECRET

[koniq]
# KonIQ-10k dataset path (run setup_koniq_dataset.py to download)
# Dataset page: http://database.mmsp-kn.de/koniq-10k-database.html
dataset_path = ./datasets/koniq10k
metadata_file = koniq10k_scores_and_distributions.csv

[wiki_commons]
# Wiki Loves Monuments and other Wikimedia Commons sources
# No API key required - uses public API

[download]
# Output directory for downloaded images
output_dir = ../rated

# Maximum retries for failed downloads
max_retries = 3

# Batch size for fetching from sources
batch_size = 10
